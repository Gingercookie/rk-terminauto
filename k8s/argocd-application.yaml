# Apply this once to register the app with ArgoCD (lives in the argocd ns):
#   kubectl -n argocd apply -f k8s/argocd-application.yaml
#
# Set repoURL to wherever you push this repo. ArgoCD then renders k8s/ with
# Kustomize and keeps the cluster in sync on every push.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rk-terminauto
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/wilgrimthepilgrim/rk-terminauto.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: rk-terminauto
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  # The out-of-band Secret will show as OutOfSync/missing otherwise; ignore it.
  ignoreDifferences: []
