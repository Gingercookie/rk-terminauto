apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rk-terminauto

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  # secret.yaml is intentionally NOT listed: it is applied out of band and
  # gitignored. ArgoCD treats the live Secret as an external resource.

labels:
  - pairs:
      app.kubernetes.io/name: rk-terminauto
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

images:
  - name: docker.io/wilgrimthepilgrim/rk-terminauto
    newTag: latest
